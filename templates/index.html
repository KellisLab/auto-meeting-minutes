<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Meeting Minutes & Standups</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 2rem; background-color: #f8f9fa; }
        .container { max-width: 800px; }
        .card { margin-bottom: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .progress { height: 25px; display: none; margin-top: 1rem; }
        #status-area { margin-top: 1rem; max-height: 300px; overflow-y: auto; display: none; }
        .log-entry { font-family: monospace; font-size: 0.9rem; margin-bottom: 0.2rem; }
        .nav-tabs .nav-link.active { font-weight: bold; color: #495057; border-top: 3px solid #0d6efd; }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-center mb-4">
            <h1 class="display-5">Mantis Auto-Minutes</h1>
            <p class="lead text-muted">AI-Powered Meeting Summaries & Daily Standups</p>
        </div>

        <div class="card">
            <div class="card-header">
                <ul class="nav nav-tabs card-header-tabs" id="modeTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="video-tab" data-bs-toggle="tab" data-bs-target="#video-pane" type="button" role="tab">🎥 Video Meeting</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="git-tab" data-bs-toggle="tab" data-bs-target="#git-pane" type="button" role="tab">💻 Git Standup</button>
                    </li>
                </ul>
            </div>
            
            <div class="card-body">
                <div class="tab-content" id="myTabContent">
                    
                    <!-- VIDEO FORM -->
                    <div class="tab-pane fade show active" id="video-pane" role="tabpanel">
                        <form id="process-form">
                            <input type="hidden" name="type" value="video">
                            <div class="mb-3">
                                <label for="url" class="form-label">Panopto Video URL</label>
                                <input type="url" class="form-control" id="url" name="url" placeholder="https://mit.hosted.panopto.com/..." required>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="language" class="form-label">Language</label>
                                    <select class="form-select" id="language" name="language">
                                        <option value="English_USA" selected>English (USA)</option>
                                        <option value="English_GB">English (UK)</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="skip_refinement" name="skip_refinement">
                                <label class="form-check-label" for="skip_refinement">Skip timestamp refinement (faster)</label>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="no_enhanced_summaries" name="no_enhanced_summaries">
                                <label class="form-check-label" for="no_enhanced_summaries">Disable Enhanced Summaries (Save Tokens)</label>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">Generate Meeting Minutes</button>
                        </form>
                    </div>

                    <!-- GIT FORM -->
                    <div class="tab-pane fade" id="git-pane" role="tabpanel">
                        <form id="git-form">
                            <input type="hidden" name="type" value="git">
                            <div class="mb-3">
                                <label for="repo_url" class="form-label">GitHub Repository URLs (One per line)</label>
                                <textarea class="form-control" id="repo_url" name="repo_url" rows="3" placeholder="https://github.com/username/repo1.git&#10;https://github.com/username/repo2.git" required></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label for="git_username" class="form-label">GitHub Username (Optional)</label>
                                <input type="text" class="form-control" id="git_username" name="git_username" placeholder="Leave empty for all users">
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="git_date" class="form-label">Start Date</label>
                                    <input type="date" class="form-control" id="git_date" name="git_date" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="git_date_end" class="form-label">End Date (Optional)</label>
                                    <input type="date" class="form-control" id="git_date_end" name="git_date_end">
                                    <div class="form-text">Leave empty for single day</div>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100">Generate Activity Report</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Area (Shared) -->
        <div id="status-container" style="display: none;">
            <div class="card">
                <div class="card-header bg-light">Processing Status</div>
                <div class="card-body">
                    <div class="progress">
                        <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                    </div>
                    <div id="status-area" class="border rounded p-2 bg-white mt-3"></div>
                    
                    <div id="results-area" class="mt-3" style="display: none;">
                        <hr>
                        <h5>Downloads:</h5>
                        <div id="download-links" class="d-grid gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Set default date to today
        document.getElementById('git_date').valueAsDate = new Date();

        function handleFormSubmit(event, formId) {
            event.preventDefault();
            const form = document.getElementById(formId);
            const formData = new FormData(form);
            
            // UI Updates
            document.getElementById('status-container').style.display = 'block';
            document.getElementById('progress-bar').style.width = '1%';
            document.getElementById('status-area').style.display = 'block';
            document.getElementById('status-area').innerHTML = '';
            document.getElementById('results-area').style.display = 'none';
            
            // Disable buttons
            const btn = form.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = 'Processing...';

            fetch('/process', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert('Error: ' + data.error);
                    btn.disabled = false;
                    btn.innerText = originalText;
                    return;
                }
                pollStatus(data.job_id, btn, originalText);
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred starting the process.');
                btn.disabled = false;
                btn.innerText = originalText;
            });
        }

        document.getElementById('process-form').addEventListener('submit', (e) => handleFormSubmit(e, 'process-form'));
        document.getElementById('git-form').addEventListener('submit', (e) => handleFormSubmit(e, 'git-form'));

        function pollStatus(jobId, btn, originalText) {
            const intervalId = setInterval(() => {
                fetch(`/status/${jobId}`)
                .then(response => response.json())
                .then(data => {
                    // Update progress
                    const progressBar = document.getElementById('progress-bar');
                    progressBar.style.width = `${data.progress}%`;
                    progressBar.innerText = `${data.progress}%`;
                    
                    // Update logs
                    const statusArea = document.getElementById('status-area');
                    statusArea.innerHTML = '';
                    data.messages.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = 'log-entry';
                        div.innerText = `[${msg.time}] ${msg.message}`;
                        statusArea.appendChild(div);
                    });
                    statusArea.scrollTop = statusArea.scrollHeight;
                    
                    if (data.status === 'completed' || data.status === 'error') {
                        clearInterval(intervalId);
                        btn.disabled = false;
                        btn.innerText = originalText;
                        
                        if (data.status === 'completed') {
                            progressBar.classList.remove('progress-bar-animated');
                            progressBar.classList.add('bg-success');
                            showDownloads(jobId, data.output_files);
                        } else {
                            progressBar.classList.add('bg-danger');
                        }
                    }
                });
            }, 1000);
        }

        function showDownloads(jobId, files) {
            const resultsArea = document.getElementById('results-area');
            const downloadLinks = document.getElementById('download-links');
            downloadLinks.innerHTML = '';
            
            for (const [type, filename] of Object.entries(files)) {
                const a = document.createElement('a');
                a.href = `/download/${jobId}/${type}`;
                a.className = 'btn btn-outline-primary';
                a.innerHTML = `Download <b>${filename}</b>`;
                downloadLinks.appendChild(a);
            }
            
            resultsArea.style.display = 'block';
        }
    </script>
</body>
</html>
